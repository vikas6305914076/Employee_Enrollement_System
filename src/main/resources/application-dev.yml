server:
  port: ${EMS_SERVER_PORT:8080}

spring:
  datasource:
    url: ${EMS_DB_URL:jdbc:mysql://localhost:3306/employee_enrollment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
    username: ${EMS_DB_USERNAME:root}
    password: ${EMS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: EmsHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  bootstrap-admin:
    enabled: ${EMS_BOOTSTRAP_ADMIN_ENABLED:true}
