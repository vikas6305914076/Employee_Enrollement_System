server:
  port: ${EMS_SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${EMS_DB_URL}
    username: ${EMS_DB_USERNAME}
    password: ${EMS_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${EMS_DB_MAX_POOL_SIZE:20}
      minimum-idle: ${EMS_DB_MIN_IDLE:5}
      pool-name: EmsProdHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

app:
  bootstrap-admin:
    enabled: ${EMS_BOOTSTRAP_ADMIN_ENABLED:false}

logging:
  level:
    root: INFO
    com.company.ems: INFO
